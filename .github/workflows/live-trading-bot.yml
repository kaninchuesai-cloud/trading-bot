name: Live Trading Bot - Binance Integration

on:
  schedule:
    - cron: '0 * * * *'   # every hour, on the hour (UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: trading-bot-state
  cancel-in-progress: false

jobs:
  live-trading:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run trading bot (paper, real prices)
        run: python trading_bot_live.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          ACCOUNT_SIZE: 1000
          RISK_PER_TRADE: 0.1
          STOP_DATE: 2026-07-21T00:00:00

      - name: Persist trading state
        run: |
          git config user.name "trading-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json || true
          git commit -m "Update trading state [skip ci]" || echo "no state change"
          git push || echo "push skipped"
